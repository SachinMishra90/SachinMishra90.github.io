<html lang="hi">

    <style>

        .hero-section { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=1350&q=80'); background-size: cover; color: white; padding: 80px 0; border-radius: 0 0 40px 40px; }

        /* Advanced Chatbot UI */
        #chatbot-container { position: fixed; bottom: 20px; right: 20px; width: 360px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); background: white; z-index: 1000; display: none; flex-direction: column; overflow: hidden; border: 1px solid #ddd; }
        #chat-header { background: var(--primary); color: white; padding: 15px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        #chat-content { height: 420px; overflow-y: auto; padding: 15px; background: #fff; display: flex; flex-direction: column; }

        .user-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        
        pre { background: #272822; color: #f8f8f2; padding: 10px; border-radius: 8px; font-size: 11px; overflow-x: auto; margin: 10px 0; white-space: pre-wrap; }
        #image-preview { max-width: 100%; border-radius: 10px; margin: 10px 0; display: none; border: 1px solid #ddd; }
        
        #chat-launcher { position: fixed; bottom: 20px; right: 20px; background: var(--secondary); color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; box-shadow: 0 8px 20px rgba(40,167,69,0.4); z-index: 1001; }
    </style>
</head>
<body>

    </div>
</nav>

<header class="hero-section text-center">
    <div class="container">
        <h1 class="display-5 fw-bold mb-3">AI Digital Assistant</h1>
        <p class="lead mb-4">Website banayein aur Images optimize karein bilkul free!</p>
        <button onclick="toggleChat()" class="btn btn-success btn-lg px-5 rounded-pill shadow">Open AI Toolkit</button>
    </div>
</header>

<div id="chat-launcher" onclick="toggleChat()"><i class="fas fa-comment-dots"></i></div>

<div id="chatbot-container">
    <div id="chat-header">
        <span>Sachin Tech AI 🚀</span>
        <i class="fas fa-times" style="cursor:pointer" onclick="toggleChat()"></i>
    </div>
    <div id="chat-content">
        <div class="bot-msg">Namaste! Main aapka digital assistant hoon. Main aapki kya madad kar sakta hoon?</div>
    </div>
    <div id="chat-footer" id="controls-area">
        <button class="user-btn mb-2" onclick="initWebBuilder()">🌐 Website Builder</button>
        <button class="user-btn" style="background:var(--accent)" onclick="initImageTool()">🖼️ Image Tools (Compress/Enhance)</button>
    </div>
</div>

<script>
    const chatContent = document.getElementById('chat-content');
    const chatFooter = document.getElementById('chat-footer');
    let bizData = { name: "", color: "#28a745" };

    function toggleChat() {
        const chat = document.getElementById('chatbot-container');
        chat.style.display = (chat.style.display === 'flex') ? 'none' : 'flex';
    }

    function addMsg(text, isBot = true) {
        const div = document.createElement('div');
        div.className = isBot ? 'bot-msg' : 'user-msg';
        div.innerHTML = text;
        chatContent.appendChild(div);
        chatContent.scrollTop = chatContent.scrollHeight;
    }

    // --- WEBSITE BUILDER LOGIC ---
    function initWebBuilder() {
        addMsg("Website Builder Shuru karte hain!", false);
        addMsg("Apne Business ka naam batayein?");
        chatFooter.innerHTML = `
            <input type="text" id="bizInput" class="form-control mb-2" placeholder="Ex: Sachin Store">
            <button class="user-btn" onclick="saveName()">Next ➡️</button>`;
    }

    function saveName() {
        const name = document.getElementById('bizInput').value || "My Business";
        bizData.name = name;
        addMsg(name, false);
        addMsg(`Nice! Ab <b>${name}</b> ke liye ek brand color chunein:`);
        chatFooter.innerHTML = `
            <input type="color" id="clrInput" class="form-control form-control-color w-100 mb-2" value="#28a745">
            <button class="user-btn" onclick="buildFinalCode()">Generate Code ✨</button>`;
    }

    function buildFinalCode() {
        bizData.color = document.getElementById('clrInput').value;
        addMsg("Aapka customized HTML code niche hai:", true);
        
        const code = `<!DOCTYPE html>
<html>
<head>
    <title>${bizData.name}</title>
    <style>
        body { font-family: sans-serif; margin: 0; text-align: center; }
        header { background: ${bizData.color}; color: white; padding: 50px; }
        .btn { background: ${bizData.color}; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <header><h1>${bizData.name}</h1></header>
    <div style="padding:50px">
        <h2>Welcome to our business!</h2>
        <a href="#" class="btn">Contact Us</a>
    </div>
</body>
</html>`;

        const pre = document.createElement('pre');
        pre.innerText = code;
        chatContent.appendChild(pre);
        
        chatFooter.innerHTML = `<button class="user-btn" onclick="copyCode(\`${code.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)">Copy HTML Code 📋</button>
                               <button class="user-btn mt-2" style="background:#6c757d" onclick="location.reload()">Back to Menu</button>`;
        chatContent.scrollTop = chatContent.scrollHeight;
    }

    function copyCode(c) {
        navigator.clipboard.writeText(c);
        alert("Code Copy Ho Gaya!");
    }

    // --- IMAGE TOOLS LOGIC ---
    function initImageTool() {
        addMsg("Image Tools select kiya gaya!", false);
        addMsg("Apni image upload karein:");
        chatFooter.innerHTML = `
            <input type="file" id="imgFile" class="form-control mb-2" accept="image/*" onchange="handleImageUpload()">
            <div id="imgOps" style="display:none">
                <button class="user-btn mb-1" onclick="processImg(0.4)">📉 Compress (Low Size)</button>
                <button class="user-btn" style="background:#f0932b" onclick="processImg(1.0, true)">✨ Enhance (AI Style)</button>
            </div>`;
    }
