<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sachin Tech | Pro Video Lab</title>

    <meta name="theme-color" content="#0a0a0a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9508363485592319" crossorigin="anonymous"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --accent: #00f2fe; --filmora-bg: #1a1a1a; --timeline-bg: #0f0f0f; }
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* App Interface Layout */
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .header-nav { height: 50px; background: #222; border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 20px; }
        
        .editor-grid { display: grid; grid-template-columns: 300px 1fr 350px; flex-grow: 1; background: var(--filmora-bg); }
        
        /* Filmora Sections */
        .asset-panel { border-right: 1px solid #333; padding: 15px; overflow-y: auto; }
        .preview-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; position: relative; }
        .control-panel { border-left: 1px solid #333; padding: 15px; }
        
        .timeline-area { height: 250px; background: var(--timeline-bg); border-top: 2px solid #333; padding: 10px; position: relative; }
        
        /* UI Elements */
        .track { height: 45px; background: #252525; border: 1px solid #333; margin-bottom: 5px; border-radius: 4px; display: flex; align-items: center; padding-left: 10px; font-size: 12px; }
        .preview-box { width: 100%; max-width: 320px; aspect-ratio: 9/16; background: #111; border: 2px solid #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        
        .btn-action { background: #333; color: white; border: 1px solid #444; padding: 5px 15px; border-radius: 4px; font-size: 13px; }
        .btn-action:hover { background: var(--accent); color: #000; }
        
        .active-tab { border-bottom: 2px solid var(--accent); color: var(--accent) !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-nav justify-content-between">
        <div class="fw-bold text-info">SachinTech <span class="text-white">Video Studio</span></div>
        <div class="d-flex gap-3">
            <button class="btn btn-sm btn-outline-light" onclick="exportVideo()">Export</button>
            <i class="fas fa-cog mt-1"></i>
        </div>
    </div>

    <div class="editor-grid">
        <div class="asset-panel">
            <h6><i class="fas fa-folder-open me-2"></i> Media</h6>
            <div class="mt-3 p-4 border border-dashed text-center rounded border-secondary" style="border-style: dashed !important;">
                <input type="file" id="upload" hidden multiple>
                <label for="upload" style="cursor: pointer;">
                    <i class="fas fa-cloud-upload-alt fa-2x text-white-50"></i>
                    <p class="small mt-2">Import Reels / Images</p>
                </label>
            </div>
            <div class="mt-4">
                <p class="small text-white-50">Effects Library</p>
                <div class="d-grid gap-2">
                    <button class="btn-action">Transitions</button>
                    <button class="btn-action">Filters</button>
                    <button class="btn-action">Music Loop</button>
                </div>
            </div>
        </div>

        <div class="preview-panel">
            <div class="preview-box">
                <div class="text-center">
                    <i class="fas fa-play fa-3x text-white-50"></i>
                    <p class="mt-3 small">No Media Selected</p>
                </div>
            </div>
            <div class="mt-3 d-flex gap-4">
                <i class="fas fa-step-backward"></i>
                <i class="fas fa-play text-info"></i>
                <i class="fas fa-step-forward"></i>
            </div>
        </div>

        <div class="control-panel">
            <h6>Properties</h6>
            <hr class="bg-secondary">
            <label class="small text-white-50">Scale</label>
            <input type="range" class="form-range" min="0" max="200">
            
            <label class="small text-white-50 mt-3">Opacity</label>
            <input type="range" class="form-range" min="0" max="100">
            
            <div class="mt-4">
                <h6>AI Tools</h6>
                <button class="btn btn-sm btn-info w-100 mb-2">Auto Captions</button>
                <button class="btn btn-sm btn-outline-info w-100">Remove BG</button>
            </div>
        </div>
    </div>

    <div class="timeline-area">
        <div class="d-flex justify-content-between mb-2">
            <div class="small text-info"><i class="fas fa-cut"></i> Timeline 00:00:00</div>
            <div>
                <i class="fas fa-search-minus mx-2"></i>
                <i class="fas fa-search-plus"></i>
            </div>
        </div>
        <div class="track"><i class="fas fa-video me-2 text-info"></i> Video Track 1</div>
        <div class="track"><i class="fas fa-font me-2 text-warning"></i> Subtitles / Text</div>
        <div class="track"><i class="fas fa-music me-2 text-primary"></i> Audio Track 1</div>
    </div>
</div>

<script>
    function exportVideo() {
        alert("Preparing Export in 4K for Instagram Reels...");
    }
</script>

</body>
</html>
