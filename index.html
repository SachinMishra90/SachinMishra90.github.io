<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sachin Tech - Meta AI Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --bg: #0a0a0a; --card: #1c1c1e; --accent: #00f2fe; }
        body { background-color: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; overflow-x: hidden; }
        
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .logo { font-weight: 700; font-size: 1.2rem; color: var(--accent); text-transform: uppercase; }

        .content-area { padding: 15px; padding-bottom: 100px; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .meta-list { background: var(--card); border-radius: 20px; overflow: hidden; margin-bottom: 20px; }
        .meta-item { display: flex; align-items: center; padding: 18px 15px; border-bottom: 1px solid #2c2c2e; cursor: pointer; }
        .meta-item:active { background: #2c2c2e; }
        .meta-icon { width: 45px; height: 45px; border-radius: 12px; background: #2c2c2e; margin-right: 15px; display: flex; align-items: center; justify-content: center; }
        .meta-icon i { font-size: 18px; color: var(--accent); }
        
        .preview-box { width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 15px; margin-bottom: 20px; position: relative; overflow: hidden; border: 1px solid #333; display: flex; align-items: center; justify-content: center; }
        #ai-output { width: 100%; height: 100%; object-fit: contain; display: none; }
        .loader { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(10,10,10,0.95); display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #222; backdrop-filter: blur(10px); }
        .nav-btn { color: #666; font-size: 22px; }
        .ai-circle { width: 55px; height: 55px; background: linear-gradient(45deg, #00f2fe, #0072ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; margin-top: -30px; border: 5px solid var(--bg); }
    </style>
</head>
<body>

    <input type="file" id="ai-input" hidden accept="image/*" onchange="runAIProcessing()">

    <div class="header">
        <div class="logo">SACHINTECH <span style="font-size: 10px; border:1px solid; padding:1px 4px; border-radius:4px;">PRO AI</span></div>
        <i class="fas fa-redo-alt" onclick="location.reload()"></i>
    </div>

    <div class="content-area">
        <div id="home-screen" class="screen active">
            <div class="meta-list">
                <div class="meta-item" onclick="document.getElementById('ai-input').click()">
                    <div class="meta-icon"><i class="fas fa-video"></i></div>
                    <div class="meta-text">Create a video from my photo</div>
                </div>
                <div class="meta-item" onclick="document.getElementById('ai-input').click()">
                    <div class="meta-icon"><i class="fas fa-magic"></i></div>
                    <div class="meta-text">Restyle my photo with AI Face Fix</div>
                </div>
            </div>
            <p class="text-center small text-white-50">AI Lab: Prayagraj, UP</p>
        </div>

        <div id="ai-screen" class="screen">
            <div class="preview-box">
                <div class="loader" id="main-loader">
                    <div class="spinner-border text-info mb-3"></div>
                    <span>AI Generating...</span>
                </div>
                <img id="ai-output" src="">
                <div id="init-msg" class="text-center text-white-50">Processing at Prayagraj Hub...</div>
            </div>
            <button class="btn btn-info w-100 fw-bold py-3 mb-2" onclick="alert('Downloading...')">DOWNLOAD 4K REEL</button>
            <button class="btn btn-outline-secondary w-100" onclick="location.reload()">BACK</button>
        </div>
    </div>

    <div class="bottom-nav">
        <i class="fas fa-home nav-btn" onclick="location.reload()"></i>
        <div class="ai-circle"><i class="fas fa-plus"></i></div>
        <i class="fas fa-user nav-btn"></i>
    </div>

    <script>
        const HF_TOKEN = "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"; 
        const MODEL_URL = "https://api-inference.huggingface.co/models/TencentARC/GFPGAN";

        async function runAIProcessing() {
            const fileInput = document.getElementById('ai-input');
            const loader = document.getElementById('main-loader');
            const outputImg = document.getElementById('ai-output');

            if (!fileInput.files[0]) return;

            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('ai-screen').classList.add('active');
            loader.style.display = 'flex';

            try {
                const response = await fetch(MODEL_URL, {
                    headers: { Authorization: `Bearer ${HF_TOKEN}` },
                    method: "POST",
                    body: fileInput.files[0],
                });

                const blob = await response.blob();
                outputImg.src = URL.createObjectURL(blob);
                outputImg.style.display = 'block';
                loader.style.display = 'none';
                document.getElementById('init-msg').style.display = 'none';
            } catch (error) {
                alert("AI Server Error. Please try again.");
                location.reload();
            }
        }
    </script>
</body>
</html>
