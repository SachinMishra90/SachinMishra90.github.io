<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sachin Tech AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #1c1c1e; --accent: #00f2fe; }
        body { background-color: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        .header { padding: 15px; border-bottom: 1px solid #2c2c2e; display: flex; justify-content: space-between; align-items: center; }
        .app-container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .meta-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; cursor: pointer; border: 1px solid #333; }
        .preview-box { width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #2c2c2e; }
        #res-img { width: 100%; height: 100%; object-fit: contain; display: none; }
        .loader { display: none; text-align: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-main { background: var(--accent); color: #000; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:bold; color:var(--accent);">SACHIN TECH AI</div>
        <div style="font-size: 10px; color: #666;">LAB: BARABANKI</div>
    </div>

    <div class="app-container">
        <div id="home-view">
            <div class="meta-card" onclick="document.getElementById('file-input').click()">
                <div style="display:flex; align-items:center;">
                    <div style="background:#2c2c2e; padding:10px; border-radius:10px; margin-right:15px;">✨</div>
                    <div><b>Start AI Generation</b><br><small style="color:#888;">Upload photo for Face Fix</small></div>
                </div>
            </div>
            <p style="text-align:center; font-size:10px; color:#444; margin-top:20px;">Powered by Hugging Face & Sachin Tech</p>
        </div>

        <div id="process-view" style="display:none;">
            <div class="preview-box">
                <div id="loader" class="loader">
                    <div class="spinner" style="margin:0 auto 10px;"></div>
                    <div style="font-size:12px; color:var(--accent);">AI Working...</div>
                </div>
                <img id="res-img" src="">
            </div>
            <button class="btn-main" onclick="location.reload()">TRY AGAIN</button>
        </div>
    </div>

    <input type="file" id="file-input" hidden accept="image/*" onchange="processAI()">

    <script>
        // AAPKA TOKEN
        const TOKEN = "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";
        // Stable Model
        const MODEL = "https://api-inference.huggingface.co/models/TencentARC/GFPGAN";

        async function processAI() {
            const file = document.getElementById('file-input').files[0];
            if(!file) return;

            document.getElementById('home-view').style.display = 'none';
            document.getElementById('process-view').style.display = 'block';
            document.getElementById('loader').style.display = 'block';

            try {
                const response = await fetch(MODEL, {
                    headers: { Authorization: `Bearer ${TOKEN}` },
                    method: "POST",
                    body: file,
                });

                if(!response.ok) throw new Error("Server Busy");

                const blob = await response.blob();
                const img = document.getElementById('res-img');
                img.src = URL.createObjectURL(blob);
                img.style.display = 'block';
                document.getElementById('loader').style.display = 'none';
                
                alert("Success! Generated in Barabanki Lab.");
            } catch (err) {
                alert("AI Server Down! 1 minute baad try karein.");
                location.reload();
            }
        }
    </script>
</body>
</html>
