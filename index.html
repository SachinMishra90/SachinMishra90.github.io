<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sachin Tech | Elite AI & Viral Ecosystem</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root { --glass: rgba(255, 255, 255, 0.03); --accent: #00f2fe; --bg: #050505; --border: rgba(255, 255, 255, 0.08); }
        * { font-family: 'Space Grotesk', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg); color: #e0e0e0; padding-top: 80px; overflow-x: hidden; }

        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 28px; padding: 25px; margin-bottom: 20px; }
        .nav-custom { background: rgba(5, 5, 5, 0.8); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
        
        .btn-premium { background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%); color: #000; font-weight: 600; border: none; border-radius: 14px; padding: 12px 28px; }
        .panel { display: none; } .panel.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Image Lab UI */
        #img-container { background: #000; border-radius: 20px; min-height: 350px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); position: relative; }
        #img-display { max-width: 100%; border-radius: 15px; }
        
        /* Viral DNA Display */
        .dna-box { background: #000; padding: 15px; border-radius: 15px; border: 1px dashed var(--accent); font-family: monospace; font-size: 11px; color: var(--accent); word-break: break-all; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg nav-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#"><span style="color:var(--accent)">SACHIN</span> TECH</a>
        <div class="d-flex gap-2">
            <button class="btn btn-sm text-white-50" onclick="showTab('home')">Home</button>
            <button class="btn btn-sm text-white-50" onclick="showTab('lab')">AI Lab</button>
            <button class="btn btn-sm btn-premium" onclick="showTab('web')">Web Builder</button>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div id="p-home" class="panel active">
        <div class="glass-card text-center">
            <h1 class="display-5 fw-bold mb-3">Viral <span style="color:var(--accent)">Chain</span> DNA</h1>
            <p class="text-white-50">Ye website har share par mutate hoti hai taaki aapka network block na ho.</p>
            
            <div class="dna-box my-4" id="viral-link-display">Generating Unique DNA Link...</div>
            
            <div class="row g-3">
                <div class="col-md-6">
                    <button class="btn btn-premium w-100 py-3" onclick="mutateAndShare('messenger')">
                        <i class="fab fa-facebook-messenger me-2"></i> Messenger Blast
                    </button>
                </div>
                <div class="col-md-6">
                    <button class="btn btn-outline-info w-100 py-3" onclick="mutateAndShare('groups')">
                        <i class="fas fa-users me-2"></i> FB Groups Blast
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="p-lab" class="panel">
        <div class="glass-card">
            <h3 class="fw-bold mb-4">Advanced Beauty Lab</h3>
            <input type="file" id="img-input" class="form-control bg-dark text-white border-secondary mb-3" onchange="previewImg(event)">
            
            <div class="row">
                <div class="col-lg-8"><div id="img-container"><img id="img-display"></div></div>
                <div class="col-lg-4">
                    <div class="p-3 bg-black rounded-4 border border-secondary mt-3 mt-lg-0">
                        <label class="small opacity-50">Filter Presets</label>
                        <button class="btn btn-outline-light w-100 mb-2 mt-2" onclick="applyMagic('smooth')">✨ Skin Smooth</button>
                        <button class="btn btn-outline-light w-100 mb-2" onclick="applyMagic('glow')">💡 Luminous Glow</button>
                        <hr class="border-secondary">
                        <button class="btn btn-premium w-100" onclick="downloadResult()">Download HQ 📥</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="p-web" class="panel">
        <div class="glass-card">
            <h3>Website Generator</h3>
            <div class="mb-3">
                <input type="text" id="site-name" class="form-control bg-dark text-white" placeholder="Project Title">
            </div>
            <button class="btn btn-premium" onclick="buildWeb()">Generate Codebase</button>
            <div id="web-output" class="mt-4 p-3 bg-black rounded border border-secondary small text-success d-none">
                &lt;!DOCTYPE html&gt;... (Code Generated Successfully)
            </div>
        </div>
    </div>

</div>

<script>
    function showTab(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('p-' + id).classList.add('active');
    }

    // --- VIRAL LOOP ENGINE (THE CORE) ---
    function getMutatedLink() {
        const salt = "NODE_" + Math.random().toString(36).substring(7).toUpperCase();
        const dna = btoa(JSON.stringify({id: salt, t: Date.now(), ip_track: true}));
        const link = window.location.origin + window.location.pathname + "?dna=" + dna;
        document.getElementById('viral-link-display').innerText = link;
        return link;
    }

    function mutateAndShare(type) {
        const link = getMutatedLink();
        navigator.clipboard.writeText(link);
        
        let url = (type === 'messenger') 
            ? `fb-messenger://share/?link=${encodeURIComponent(link)}` 
            : `https://www.facebook.com/groups/feed/`;
        
        alert("Nayi Mutated Link Copy ho gayi hai! Ab ise paste karke viral karein.");
        window.open(url, '_blank');
    }

    // --- IMAGE LAB LOGIC (RESTORED) ---
    function previewImg(e) {
        const reader = new FileReader();
        reader.onload = f => document.getElementById('img-display').src = f.target.result;
        reader.readAsDataURL(e.target.files[0]);
    }

    function applyMagic(type) {
        const img = document.getElementById('img-display');
        if(!img.src) return;
        img.style.filter = (type === 'smooth') ? 'blur(0.4px) contrast(1.1) saturate(1.1)' : 'brightness(1.2) contrast(1.05)';
    }

    function downloadResult() {
        const img = document.getElementById('img-display');
        if(!img.src) return;
        const a = document.createElement('a');
        a.href = img.src; a.download = "SachinTech_AI.jpg"; a.click();
    }

    function buildWeb() {
        document.getElementById('web-output').classList.remove('d-none');
        alert("Deployment script taiyar hai!");
    }

    // Initialize DNA
    window.onload = getMutatedLink;
</script>

</body>
</html>
