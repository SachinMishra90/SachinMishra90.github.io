<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sachin Tech AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #1c1c1e; --accent: #3797f0; --text: #f5f5f5; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        
        /* Meta Style Header */
        .header { padding: 15px 20px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.2rem; font-weight: 700; color: #fff; }

        .container-main { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        /* Simple Meta AI List View */
        .option-card { background: var(--card); border-radius: 18px; margin-bottom: 12px; padding: 16px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .option-card:active { transform: scale(0.98); background: #262626; border-color: #333; }
        .icon-circle { width: 42px; height: 42px; border-radius: 50%; background: #2c2c2e; display: flex; align-items: center; justify-content: center; margin-right: 15px; color: var(--accent); }

        /* Output / Preview Area */
        .view-screen { display: none; text-align: center; }
        .preview-box { width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 20px; border: 1px solid #262626; margin-bottom: 20px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
        #output-media { width: 100%; height: 100%; object-fit: contain; display: none; }
        
        .loader { display: none; flex-direction: column; align-items: center; }
        .spinner { width: 35px; height: 35px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Meta Style Bottom Button */
        .btn-meta { background: var(--accent); color: #fff; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 1rem; margin-top: 10px; }
        .footer { text-align: center; color: #666; font-size: 11px; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Sachin Tech <small style="font-size: 10px; font-weight: normal; opacity: 0.6;">AI HUB</small></div>
        <i class="fas fa-ellipsis-v text-white-50"></i>
    </div>

    <div class="container-main">
        
        <div id="home-view">
            <h5 class="mb-4" style="font-weight: 400;">For you ></h5>
            
            <div class="option-card d-flex align-items-center" onclick="triggerAI()">
                <div class="icon-circle"><i class="fas fa-video"></i></div>
                <div><div class="fw-bold">Create video from photo</div><small class="text-white-50">AI automatically generates video</small></div>
            </div>

            <div class="option-card d-flex align-items-center" onclick="triggerAI()">
                <div class="icon-circle"><i class="fas fa-magic"></i></div>
                <div><div class="fw-bold">AI Restyle & Fix</div><small class="text-white-50">Instant face and quality fix</small></div>
            </div>

            <div class="footer">Lab: Barabanki, UP</div>
        </div>

        <div id="working-view" class="view-screen">
            <div class="preview-box">
                <div class="loader" id="ai-loader">
                    <div class="spinner mb-3"></div>
                    <span class="small text-white-50">AI is creating...</span>
                </div>
                <img id="output-media" src="">
            </div>
            <button class="btn-meta" onclick="location.reload()">Create New</button>
            <p class="small text-white-50 mt-3">Barabanki Server Active</p>
        </div>

    </div>

    <input type="file" id="file-selector" hidden accept="image/*" onchange="runMetaAI()">

    <script>
        // Aapka Active Token
        const HF_KEY = "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";
        // Stable Face/Video Model
        const MODEL_URL = "https://api-inference.huggingface.co/models/TencentARC/GFPGAN";

        function triggerAI() {
            document.getElementById('file-selector').click();
        }

        async function runMetaAI() {
            const file = document.getElementById('file-selector').files[0];
            if(!file) return;

            document.getElementById('home-view').style.display = 'none';
            document.getElementById('working-view').style.display = 'block';
            document.getElementById('ai-loader').style.display = 'flex';

            try {
                const response = await fetch(MODEL_URL, {
                    headers: { Authorization: `Bearer ${HF_KEY}` },
                    method: "POST",
                    body: file,
                });

                if(!response.ok) throw new Error("Busy");

                const blob = await response.blob();
                const output = document.getElementById('output-media');
                output.src = URL.createObjectURL(blob);
                output.style.display = 'block';
                document.getElementById('ai-loader').style.display = 'none';
            } catch (e) {
                alert("AI Hub is busy. Please try in 10 seconds.");
                location.reload();
            }
        }
    </script>
</body>
</html>
