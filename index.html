<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sachin Tech AI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --bg: #0a0a0a; --card: #1c1c1e; --accent: #00f2fe; --text-gray: #b0b0b0; }
        body { background-color: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding-bottom: 30px; }

        /* Meta AI Style Header */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2c2c2e; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .logo { font-size: 1.1rem; font-weight: 600; color: #fff; }
        .logo span { color: var(--accent); font-size: 0.8rem; margin-left: 5px; border: 1px solid var(--accent); padding: 1px 5px; border-radius: 4px; }

        .app-container { padding: 20px; max-width: 500px; margin: 0 auto; }
        
        /* Simple Meta AI List Look */
        .meta-card { background: var(--card); border-radius: 18px; margin-bottom: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .meta-card:active { transform: scale(0.98); background: #2c2c2e; border-color: #444; }
        .card-body { padding: 16px; display: flex; align-items: center; }
        .icon-box { width: 40px; height: 40px; border-radius: 12px; background: #2c2c2e; display: flex; align-items: center; justify-content: center; margin-right: 15px; }
        .icon-box i { color: var(--accent); font-size: 1.1rem; }
        .card-text { font-size: 0.95rem; font-weight: 400; color: #f5f5f5; }

        /* AI Output Area */
        .preview-area { display: none; text-align: center; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .output-box { width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 20px; border: 1px solid #2c2c2e; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #res-img { width: 100%; height: 100%; object-fit: contain; display: none; }
        
        .loader { display: none; flex-direction: column; align-items: center; }
        .spinner { width: 35px; height: 35px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-reset { background: var(--accent); color: #000; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: 700; margin-top: 10px; }
        .footer-loc { text-align: center; color: var(--text-gray); font-size: 0.75rem; margin-top: 40px; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Sachin Tech <span>PRO AI</span></div>
        <i class="fas fa-history text-white-50" onclick="location.reload()" style="cursor:pointer;"></i>
    </div>

    <div class="app-container">
        
        <div id="home-view">
            <p class="small text-white-50 mb-3" style="letter-spacing: 0.5px;">FOR YOU ></p>
            
            <div class="meta-card" onclick="triggerUpload()">
                <div class="card-body">
                    <div class="icon-box"><i class="fas fa-video"></i></div>
                    <div class="card-text">Create a video from my photo</div>
                </div>
            </div>

            <div class="meta-card" onclick="triggerUpload()">
                <div class="card-body">
                    <div class="icon-box"><i class="fas fa-magic"></i></div>
                    <div class="card-text">Restyle my photo with AI Face Fix</div>
                </div>
            </div>

            <div class="footer-loc">AI Lab: Barabanki, UP</div>
        </div>

        <div id="process-view" class="preview-area">
            <div class="output-box">
                <div class="loader" id="main-loader">
                    <div class="spinner"></div>
                    <span class="small text-white-50">AI is working...</span>
                </div>
                <img id="res-img" src="">
            </div>
            
            <button class="btn-reset" onclick="location.reload()">CREATE ANOTHER</button>
            <p class="small text-white-50 mt-3">Processing at Barabanki Hub</p>
        </div>

    </div>

    <input type="file" id="file-hidden" hidden accept="image/*" onchange="runAI()">

    <script>
        // Your active token from screenshot
        const TOKEN = "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"; 
        const API_URL = "https://api-inference.huggingface.co/models/TencentARC/GFPGAN";

        function triggerUpload() {
            document.getElementById('file-hidden').click();
        }

        async function runAI() {
            const file = document.getElementById('file-hidden').files[0];
            if(!file) return;

            // UI Switch
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('process-view').style.display = 'block';
            document.getElementById('main-loader').style.display = 'flex';

            try {
                const response = await fetch(API_URL, {
                    headers: { Authorization: `Bearer ${TOKEN}` },
                    method: "POST",
                    body: file,
                });

                if(!response.ok) throw new Error();

                const blob = await response.blob();
                const img = document.getElementById('res-img');
                img.src = URL.createObjectURL(blob);
                img.style.display = 'block';
                document.getElementById('main-loader').style.display = 'none';
                
                alert("Success: AI generated in Barabanki lab.");
            } catch (e) {
                alert("AI Server Error. Please check token or try later.");
                location.reload();
            }
        }
    </script>
</body>
</html>
