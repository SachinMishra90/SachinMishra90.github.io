<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sachin Tech - Meta AI Style</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --bg: #0a0a0a; --card: #1c1c1e; --accent: #00f2fe; }
        body { background-color: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; margin: 0; }
        
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 700; font-size: 1.2rem; color: var(--accent); }

        .content-area { padding: 15px; }
        .for-you-text { color: #8e8e93; font-size: 14px; font-weight: 600; margin-bottom: 20px; }

        /* Meta Style List Layout */
        .meta-list { background: var(--card); border-radius: 20px; overflow: hidden; }
        .meta-item { 
            display: flex; align-items: center; padding: 15px; 
            border-bottom: 1px solid #2c2c2e; transition: 0.3s; cursor: pointer;
        }
        .meta-item:last-child { border-bottom: none; }
        .meta-item:active { background: #2c2c2e; }

        .meta-icon { 
            width: 50px; height: 50px; border-radius: 12px; 
            background: #333; margin-right: 15px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .meta-icon i { font-size: 20px; color: var(--accent); }
        .meta-text { font-size: 15px; font-weight: 500; }

        /* Bottom Bar */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #111; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #222; }
        .nav-btn { color: #666; font-size: 24px; }
        .nav-btn.active { color: var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">SACHINTECH <span style="font-size: 10px; border:1px solid; padding:1px 4px; border-radius:4px;">PRO AI</span></div>
        <div class="nav-btn"><i class="fas fa-sync-alt" style="font-size: 18px;"></i></div>
    </div>

    <div class="content-area">
        <div class="for-you-text text-center">For you <i class="fas fa-chevron-right ms-1" style="font-size: 10px;"></i></div>
        
        <div class="meta-list">
            <div class="meta-item" onclick="triggerAI('Create Video')">
                <div class="meta-icon"><i class="fas fa-play"></i></div>
                <div class="meta-text">Create a video from my photo</div>
            </div>

            <div class="meta-item" onclick="triggerAI('Face Enhance')">
                <div class="meta-icon"><i class="fas fa-user-magic"></i></div>
                <div class="meta-text">Restyle my photo with AI Face Fix</div>
            </div>

            <div class="meta-item" onclick="triggerAI('Developer Info')">
                <div class="meta-icon"><i class="fas fa-code"></i></div>
                <div class="meta-text">Sachin Tech Developer Portfolio</div>
            </div>

            <div class="meta-item" onclick="triggerAI('Location')">
                <div class="meta-icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="meta-text">AI Lab: Barabanki, UP</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <i class="fas fa-film nav-btn active"></i>
        <i class="fas fa-circle-notch nav-btn" style="font-size: 35px; color: var(--accent);"></i>
        <i class="fas fa-user-circle nav-btn"></i>
    </div>

    <script>
        function triggerAI(msg) {
            alert(msg + " processing at Barabanki hub...");
        }
    </script>

</body>
</html>
